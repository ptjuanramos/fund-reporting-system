name: Provision — Databricks

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'databricks-setup/**'
      - '.github/workflows/provision-databricks.yaml'

permissions:
  contents: read
  id-token: write

env:
  TF_WORKING_DIR: databricks-setup/terraform
  TF_VAR_resource_group_name: "fund-reporting-rg"
  TF_VAR_tf_state_storage_account_name: "fundreportingstracc"
  TF_VAR_arm_client_id:       ${{ secrets.AZURE_CLIENT_ID }}
  TF_VAR_arm_tenant_id:       ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_arm_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  preflight:
    name: Validate prerequisites
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate resource group exists
        run: |
          if ! az group show --name "$TF_VAR_resource_group_name" &>/dev/null; then
            echo "::error::Resource group '$TF_VAR_resource_group_name' not found."
            echo "::error::Run the 'Cold Start — Base Infrastructure' workflow first."
            exit 1
          fi
          echo "Resource group OK"

      - name: Validate Terraform state storage account exists
        run: |
          if ! az storage account show \
               --name "$TF_VAR_tf_state_storage_account_name" \
               --resource-group "$TF_VAR_resource_group_name" &>/dev/null; then
            echo "::error::Storage account '$TF_VAR_tf_state_storage_account_name' not found."
            echo "::error::Run the 'Cold Start — Base Infrastructure' workflow first."
            exit 1
          fi
          echo "State storage account OK"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: preflight
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="use_oidc=true" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Apply (workspace)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -target=azurerm_databricks_workspace.main -auto-approve
        env:
          TF_VAR_location:          "northeurope"
          TF_VAR_environment:       "dev"
          TF_VAR_workspace_name:    "fund-reporting-dbw"
          TF_VAR_project_name:      "fund-reporting"
          TF_VAR_admin_user_email:  ${{ secrets.DATABRICKS_ADMIN_EMAIL }}

      - name: Get Databricks Azure AD token
        id: dbtoken
        run: |
          TOKEN=$(az account get-access-token --resource "2ff814a6-3304-4ab8-85cb-cd0e6f879c1d" --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_location:               "northeurope"
          TF_VAR_environment:            "dev"
          TF_VAR_workspace_name:         "fund-reporting-dbw"
          TF_VAR_project_name:           "fund-reporting"
          TF_VAR_databricks_azure_token: ${{ steps.dbtoken.outputs.token }}
          TF_VAR_admin_user_email:       ${{ secrets.DATABRICKS_ADMIN_EMAIL }}

      - name: Show workspace URL
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -raw workspace_url