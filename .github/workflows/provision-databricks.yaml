name: Provision — Databricks

on:
  push:
    branches: [main]
    paths:
      - "databricks-setup/**"
  pull_request:
    branches: [main]
    paths:
      - "databricks-setup/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: databricks-setup/terraform

jobs:
  preflight:
    name: Validate prerequisites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate resource group exists
        run: |
          if ! az group show --name fund-admin-poc-rg &>/dev/null; then
            echo "::error::Resource group 'fund-admin-poc-rg' not found."
            echo "::error::Run the 'Cold Start — Base Infrastructure' workflow first."
            exit 1
          fi
          echo "Resource group OK"

      - name: Validate Terraform state storage account exists
        run: |
          if ! az storage account show \
               --name fundadminpocstracc \
               --resource-group fund-admin-poc-rg &>/dev/null; then
            echo "::error::Storage account 'fundadminpocstracc' not found."
            echo "::error::Run the 'Cold Start — Base Infrastructure' workflow first."
            exit 1
          fi
          echo "State storage account OK"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init 

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      has_changes: ${{ steps.plan.outputs.exit_code == '2' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init 

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_resource_group_name: "fund-reporting-rg"
          TF_VAR_tf_state_storage_account_name: "fundreportingstracc"
          TF_VAR_location:               "northeurope"
          TF_VAR_environment:            "dev"
          TF_VAR_workspace_name:      "fund-reporting-dbw"
          TF_VAR_project_name:        "fund-reporting"

      - name: Show workspace URL
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -raw workspace_url