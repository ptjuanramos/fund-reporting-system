name: Cold Start — Base Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cold-start/**'
      - '.github/workflows/cold-start-provision.yaml'

permissions:
  contents: read
  id-token: write

env:
  TF_WORKING_DIR: cold-start/terraform
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  cold-start:
    name: Cold Start — Base Infrastructure
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_resource_group_name: "fund-reporting-rg"
          TF_VAR_tf_state_storage_account_name: "fundreportingstracc"
          TF_VAR_location:               "northeurope"
          TF_VAR_environment:            "dev"
